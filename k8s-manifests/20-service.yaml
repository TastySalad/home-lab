# Type LoadBalancer works with in-cluster MetalLB; omit or change the annotation
# to match your MetalLB IP pool, e.g. metallb.universe.tf/loadBalancerIPs: "192.168.1.240"
apiVersion: v1
kind: Service
metadata:
  name: minecraft
  namespace: minecraft
  labels:
    app: minecraft
spec:
  type: LoadBalancer
  selector:
    app: minecraft
  ports:
    - name: game
      port: 25565
      targetPort: game
      protocol: TCP
      # Optional explicit node port when you prefer predictable local forwarding:
      # nodePort: 30565
