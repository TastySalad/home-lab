apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft
  namespace: minecraft
  labels:
    app: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          image: itzg/minecraft-server:latest
          ports:
            - name: game
              containerPort: 25565
              protocol: TCP
          env:
            - name: EULA
              value: "TRUE"
            - name: MEMORY
              value: "2G"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: game
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: game
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: data
          emptyDir: {}
