# HashiCorp Vault (HA + integrated Raft) via official Helm chart.
# MetalLB: pool metallb/address-pool is 192.168.0.60–192.168.0.100; .60/.69/.70 are in use → Vault LB .71
# Chart server Service template does not set spec.loadBalancerIP; MetalLB annotation requests the IP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.29.1
    helm:
      values: |
        injector:
          enabled: false
        server:
          standalone:
            enabled: false
          ha:
            enabled: true
            raft:
              enabled: true
              setNodeId: true
          service:
            type: LoadBalancer
            annotations:
              metallb.io/loadBalancerIPs: "192.168.0.71"
        ui:
          enabled: true
          serviceType: NodePort
          serviceNodePort: 30820
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
