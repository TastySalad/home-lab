apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lab-core
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:TastySalad/home-lab.git
    targetRevision: main
    path: k8s-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: minecraft
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
