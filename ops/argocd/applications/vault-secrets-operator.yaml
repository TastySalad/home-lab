# Vault Secrets Operator — requires Vault `auth/kubernetes` + role `vso-role` (and policy) configured out-of-band.
# Helm: chart vault-secrets-operator from HashiCorp (same index as vault).
# Namespace vault-sep matches auth/kubernetes/role bound_service_account_namespaces.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-secrets-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault-secrets-operator
    targetRevision: "1.3.0"
    helm:
      values: |
        defaultVaultConnection:
          enabled: true
          address: "http://vault.vault.svc.cluster.local:8200"
        defaultAuthMethod:
          enabled: true
          method: kubernetes
          mount: kubernetes
          kubernetes:
            role: vso-role
            serviceAccount: vault-secrets-operator
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-sep
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
