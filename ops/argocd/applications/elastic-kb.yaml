apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elastic-kb
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:TastySalad/home-lab.git
    targetRevision: main
    path: k8s-manifests
    directory:
      include: 'elastic-*.yaml'
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: elastic-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
