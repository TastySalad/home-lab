# KV v2: mount secret, UI path secret/terraform → path terraform.
# Vault key agent-token → Kubernetes Secret key token (for TFC_AGENT_TOKEN).
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: tfc-agent-token-sync
  namespace: tfc-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  vaultAuthRef: default
  mount: secret
  type: kv-v2
  path: terraform
  refreshAfter: 5m
  destination:
    name: tfc-agent-token
    create: true
    transformation:
      excludes:
        - .*
      templates:
        token:
          text: '{{ get .Secrets "agent-token" }}'
